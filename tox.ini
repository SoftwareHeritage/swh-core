[tox]
minversion = 4
envlist =
  black
  flake8
  mypy
  py3-{core,db,server,github,s3}

[testenv]
usedevelop = true
passenv = PYTHONASYNCIODEBUG
extras =
  testing-core
  core: logging
  db: db
  s3: s3
  server: http
deps =
  cover: pytest-cov
commands =
  pytest --doctest-modules \
  slow:  --hypothesis-profile=slow \
  cover: --cov=swh/core --cov-branch \
  core:  swh/core/tests \
  db:    swh/core/db/tests \
  s3: swh/core/s3/tests \
  server: swh/core/api/tests \
  github: swh/core/github/tests \
         {posargs}

[testenv:py3{,11,12,13,14,15},pypy3{,11,12,13,14,15}]
skip_install = true
allowlist_externals = tox
commands = tox run -e {env_name}-core-db-server-github-s3-slow-cover -- {posargs}

[testenv:black]
skip_install = true
deps =
  black==26.5.1
commands =
  {envpython} -m black --check swh

[testenv:flake8]
skip_install = true
deps =
  flake8==7.3.0
  flake8-bugbear==25.11.29
  flake8-pyproject==1.2.4
  pycodestyle==2.14.0

commands =
  {envpython} -m flake8

[testenv:mypy]
extras =
  testing-core
  logging
  db
  http
  s3
deps =
  mypy==2.1.0
commands =
  mypy -n8 swh

# build documentation outside swh-environment using the current
# git HEAD of swh-docs, is executed on CI for each diff to prevent
# breaking doc build
[testenv:sphinx]
allowlist_externals = make
extras =
  testing-core
  logging
  db
  http
  s3
deps =
  # fetch and install swh-docs
  git+https://gitlab.softwareheritage.org/swh/devel/swh-docs.git\#egg=swh.docs
setenv =
  SWH_PACKAGE_DOC_TOX_BUILD = 1
  # turn warnings into errors
  SPHINXOPTS = -W
commands =
  make -I {env_dir}/share/swh-docs -C docs
